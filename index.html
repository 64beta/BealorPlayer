<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BealorPlayer</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root { 
            --plyr-color-main: #ff0000; 
            --bg: #000; 
            --header-h: 60px; 
            --title-h: 45px; 
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
        }

        .app-grid {
            display: grid;
            grid-template-rows: var(--header-h) 1fr;
            grid-template-columns: 1fr 380px;
            height: 100vh;
        }

        header {
            grid-column: 1 / 3;
            background: #0f0f0f;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; border-bottom: 1px solid #222; z-index: 10;
        }

        .logo { font-size: 22px; font-weight: bold; letter-spacing: -0.5px; }
        .logo span { color: #ff0000; }

        .video-section {
            display: flex;
            flex-direction: column;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        .video-container {
            flex: 1; 
            display: flex;
            align-items: center; 
            justify-content: center; 
            background: #000;
            overflow: hidden;
            padding: 5px; 
        }

        .plyr {
            width: 100% !important;
            height: 100% !important;
            max-width: 100%;
            max-height: calc(100vh - var(--header-h) - var(--title-h) - 40px) !important;
        }

        video {
            object-fit: contain !important; 
            width: 100% !important;
            height: 100% !important;
        }

        .video-footer {
            height: var(--title-h);
            line-height: var(--title-h);
            padding: 0 20px;
            background: #0a0a0a;
            font-size: 15px;
            font-weight: 500;
            color: #eee;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-top: 1px solid #1a1a1a;
        }

        .sidebar {
            background: #0f0f0f;
            border-left: 1px solid #222;
            overflow-y: auto;
            padding: 15px;
        }

        .sidebar-header {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .item {
            display: flex; gap: 12px; padding: 12px; margin-bottom: 8px;
            background: #181818; border-radius: 8px; cursor: pointer;
            border: 1px solid transparent; font-size: 13px;
            transition: all 0.2s ease;
        }

        .item.active { border-color: #ff0000; background: #252525; }
        .item:hover { background: #333; }

        .item-idx { color: #555; width: 20px; font-weight: bold; }
        .item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .btn-group { display: flex; gap: 10px; }
        .btn { 
            background: #ff0000; color: white; padding: 8px 16px; 
            border-radius: 4px; cursor: pointer; font-weight: bold; 
            font-size: 12px; border: none; transition: 0.2s;
        }
        .btn:hover { background: #cc0000; transform: translateY(-1px); }
        .btn-secondary { background: #333; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-grid">
    <header>
        <div class="logo">Bealor<span>Player</span></div>
        <div class="btn-group">
            <label class="btn">
                IMPORT FOLDER
                <input type="file" id="dirInput" webkitdirectory directory multiple style="display:none;">
            </label>
            <label class="btn btn-secondary">
                ADD FILES
                <input type="file" id="fileInput" multiple accept="video/*" style="display:none;">
            </label>
        </div>
    </header>

    <main class="video-section">
        <div class="video-container">
            <video id="player" playsinline controls></video>
        </div>
        <div class="video-footer" id="vTitle">Ready...</div>
    </main>

    <aside class="sidebar">
        <div class="sidebar-header">Playlist</div>
        <div id="vList"></div>
    </aside>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
    const player = new Plyr('#player', {
        tooltips: { controls: true, seek: true },
        keyboard: { focused: true, global: true }
    });
    
    const dirInput = document.getElementById('dirInput');
    const fileInput = document.getElementById('fileInput');
    const vList = document.getElementById('vList');
    const vTag = document.getElementById('player');
    const vTitle = document.getElementById('vTitle');

    let queue = [];
    let current = 0;

    function handleFiles(files) {
        const videoFiles = Array.from(files)
            .filter(f => f.type.startsWith('video/'))
            .sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));
        
        if (videoFiles.length === 0) return;

        const mapped = videoFiles.map(f => ({ name: f.name, url: URL.createObjectURL(f) }));
        queue = [...queue, ...mapped];
        render();
        
        if (vTag.src === "" || vTag.src.includes(window.location.host)) {
            play(0);
        }
    }

    dirInput.onchange = (e) => handleFiles(e.target.files);
    fileInput.onchange = (e) => handleFiles(e.target.files);

    function render() {
        vList.innerHTML = '';
        queue.forEach((v, i) => {
            const div = document.createElement('div');
            div.className = `item ${i === current ? 'active' : ''}`;
            div.onclick = () => play(i);
            div.innerHTML = `<span class="item-idx">${i+1}</span> <span class="item-name">${v.name}</span>`;
            vList.appendChild(div);
        });
    }

    function play(idx) {
        current = idx;
        vTag.src = queue[idx].url;
        vTitle.innerText = `Playing: ${queue[idx].name}`;
        render();
        player.play();
        
        const active = document.querySelector('.active');
        if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    vTag.onended = () => { if (current < queue.length - 1) play(current + 1); };
</script>

</body>
</html>
